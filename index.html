<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0e1726" />
  <title>凯格尔训练</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/home.css" />
  <link rel="stylesheet" href="css/stage.css" />
  <link rel="stylesheet" href="css/training.css" />
  <link rel="stylesheet" href="css/feedback.css" />
  <link rel="stylesheet" href="css/record.css" />
</head>
<body>
  <div id="app">
    <header id="app-header">
      <button id="back-btn" class="hidden" aria-label="返回">
        <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
          <path d="M15 6l-6 6 6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </button>
      <h1 id="app-title">凯格尔训练</h1>
      <button id="record-btn" class="icon-btn" aria-label="训练记录">
        <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
          <rect x="3" y="5" width="18" height="16" rx="2" fill="none" stroke="currentColor" stroke-width="2" />
          <path d="M3 9h18M8 3v4M16 3v4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        </svg>
      </button>
    </header>

    <main id="app-main">
      <section id="view-home" class="view"></section>
      <section id="view-stage" class="view hidden"></section>
      <section id="view-training" class="view hidden"></section>
      <section id="view-feedback" class="view hidden"></section>
      <section id="view-record" class="view hidden"></section>
    </main>
  </div>

  <div id="audio-unlock-hint" class="hidden">
    <div class="hint-card">
      <div class="hint-title">点击任意位置开始</div>
      <div class="hint-sub">iOS 需要一次手势后才能播放声音</div>
    </div>
  </div>

  <div id="toast" class="hidden"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
